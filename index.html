<script>
    const URL_API = 'https://script.google.com/macros/s/AKfycbxqZhZ15KIsX3sHcflDZrFHabsa-Jk2aWKkTSeOzdNiq0a5G7sYxVcSiUuh98oqOOdq/exec';
    let dadosDoMesAtual = []; // Cache na memória

    // 1. Carrega as abas e já tenta baixar o primeiro mês da lista
    async function iniciar() {
        const select = document.getElementById('selectMes');
        try {
            const res = await fetch(`${URL_API}?getTabs=true`, { method: 'GET', redirect: 'follow' });
            const abas = await res.json();
            select.innerHTML = abas.map(n => `<option value="${n}">${n}</option>`).join('');
            document.getElementById('btnPesquisar').disabled = false;
            
            // Pré-carrega o primeiro mês da lista automaticamente
            carregarDadosDoMes(select.value);
        } catch (e) { console.error("Erro ao iniciar"); }
    }

    // 2. Sempre que mudar o mês, ele já baixa os dados na hora
    async function carregarDadosDoMes(mes) {
        console.log("Pré-carregando: " + mes);
        try {
            const res = await fetch(`${URL_API}?mes=${encodeURIComponent(mes)}`, { method: 'GET', redirect: 'follow' });
            dadosDoMesAtual = await res.json();
            console.log("Dados prontos para busca instantânea!");
        } catch (e) { console.error("Erro no pré-carregamento"); }
    }

    // Escuta a mudança do seletor de mês
    document.getElementById('selectMes').addEventListener('change', (e) => {
        dadosDoMesAtual = []; // Limpa o anterior
        carregarDadosDoMes(e.target.value);
    });

    // 3. A pesquisa agora é 100% local e instantânea
    function realizarConsulta() {
        const conta = document.getElementById('inputConta').value.trim();
        const cpf = document.getElementById('inputCPF').value.trim().replace(/\D/g, '');
        const box = document.getElementById('resultado');
        const status = document.getElementById('status');

        box.style.display = 'none';

        if (dadosDoMesAtual.length === 0) {
            status.innerHTML = '<span>⏳ Sincronizando com a planilha... tente em 2 segundos.</span>';
            return;
        }

        const aluno = dadosDoMesAtual.find(a => {
            const vConta = String(a["CONTA"]).trim();
            const vCPF = String(a["CPF"]).replace(/\D/g, '');
            return (conta && vConta === conta) || (cpf && vCPF === cpf);
        });

        if (aluno) {
            // Preenchimento (igual ao anterior)
            document.getElementById('resMatricula').innerText = aluno["MATRÍCULA"] || "-";
            document.getElementById('resAluno').innerText = aluno["ALUNO"] || "-";
            document.getElementById('resStatus').innerText = aluno["STATUS"] || "-";
            document.getElementById('resUnidade').innerText = aluno["UNIDADE"] || "-";
            document.getElementById('resEtapa').innerText = aluno["ETAPA"] || "-";
            document.getElementById('resTurma').innerText = aluno["TURMA"] || "-";
            document.getElementById('resFaltas').innerText = aluno["faltas"] || "0";
            document.getElementById('resMotivo').innerText = aluno["MOTIVO"] || "Sem observações.";
            document.getElementById('resCPF').innerText = `***.***.${String(aluno["CPF"]).replace(/\D/g, '').substring(6,9)}-**`;
            
            box.style.display = 'block';
            status.innerHTML = '<span style="color:green">✅ Localizado!</span>';
        } else {
            status.innerHTML = '<span style="color:red">⚠️ Não encontrado.</span>';
        }
    }

    iniciar();
</script>
